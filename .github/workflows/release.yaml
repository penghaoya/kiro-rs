name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BUN_VERSION: "1.3"
  RUST_TOOLCHAIN: "1.92"

jobs:
  build-frontend:
    name: Build Admin UI (once)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('admin-ui/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: bun run build
        working-directory: admin-ui
        run: |
          bun install --frozen-lockfile --ignore-scripts
          bun run build

      - uses: actions/upload-artifact@v4
        with:
          name: admin-ui-dist
          path: admin-ui/dist
          if-no-files-found: error

  build-binaries:
    name: ${{ matrix.suffix }}
    needs: build-frontend
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            suffix: Linux-musl-x64
            bin: kiro-rs
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            suffix: Linux-musl-arm64
            bin: kiro-rs
          - os: macos-14
            target: x86_64-apple-darwin
            suffix: macOS-x64
            bin: kiro-rs
          - os: macos-14
            target: aarch64-apple-darwin
            suffix: macOS-arm64
            bin: kiro-rs
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: Windows-x64
            bin: kiro-rs.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: admin-ui-dist
          path: admin-ui/dist

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      - name: Install musl (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: cargo build
        run: cargo build --release --locked --no-default-features --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          OUT="kiro-rs-${VERSION}-${{ matrix.suffix }}"
          BIN="target/${{ matrix.target }}/release/${{ matrix.bin }}"
          install -m 755 "$BIN" "./${{ matrix.bin }}"
          tar -czf "${OUT}.tar.gz" "./${{ matrix.bin }}"
          mkdir -p release
          mv "${OUT}.tar.gz" release/

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME.TrimStart('v')
          $out = "kiro-rs-$version-${{ matrix.suffix }}"
          $bin = "target/${{ matrix.target }}/release/${{ matrix.bin }}"
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Compress-Archive -Path $bin -DestinationPath "release/$out.zip" -Force

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.suffix }}
          path: release/
          if-no-files-found: error

  release:
    name: GitHub Release
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: binary-*
          merge-multiple: true

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          find dist -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release/ \;
          cd release
          sha256sum *.tar.gz *.zip 2>/dev/null | sort -k2 > SHA256SUMS.txt
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
